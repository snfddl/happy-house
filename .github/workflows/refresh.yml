name: refresh & deploy

# 결정론 갱신만 CI에서: 전 소스 상태/마감일 갱신 → 빌드 → Pages 배포.
#   SH/GH: 키 불필요(라이브 스크래핑). LH/myhome: 키 있으면 --refresh 상태갱신(없으면 graceful skip), 추출은 로컬.
#   applyhome(청약홈): 추출이 결정론(applyhome-derive, LLM 0)이라 키 있으면 collect+derive로 신규까지 CI 완전 처리.
# 키: secrets.DATA_GO_KR_SERVICE_KEY (data.go.kr). 미설정이면 키 필요 소스만 graceful 생략, 나머지 진행.
# 요건추출(LLM)은 CI에서 안 함 — LH/myhome 신규는 이슈로 알리고 로컬 `node process-all.mjs`/`/update`로 처리.

on:
  schedule:
    - cron: '0 0,8,16 * * *'   # UTC 00·08·16시 = KST 09·17·01시 (하루 3회) — 상태갱신+배포
  workflow_dispatch: {}         # 수동 실행 버튼 — 상태갱신+배포
  push:                         # 코드/데이터 변경 즉시 배포(스크래핑은 생략)
    branches: [main]
    paths:
      - 'site/**'
      - '*.mjs'
      - 'data/derived/**'
      - '.github/workflows/**'

permissions:
  contents: write   # index.json 갱신 커밋
  pages: write      # Pages 배포
  id-token: write
  issues: write     # 신규 공고 알림

concurrency:
  group: pages-refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 상태/마감일 갱신 (다운로드 없음)
        if: github.event_name != 'push'   # push 배포 땐 스크래핑 생략(빠르게)
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}   # 미설정이면 키 필요 소스는 graceful 생략
        run: |
          node lh-collect.mjs --refresh || true        # LH 상태갱신(키 없으면 graceful), 신규는 new-pending
          node sh-collect.mjs --refresh                # SH — 라이브 스크래핑(키 불필요)
          node gh-collect.mjs --refresh                # GH — 라이브 스크래핑+인라인 인증서(키 불필요)
          node myhome-collect.mjs --refresh || true    # 마이홈 상태갱신(키 필요·없으면 graceful), 신규는 new-pending
          node applyhome-collect.mjs && node applyhome-derive.mjs || true   # 청약홈: 결정론 완전(키 필요). 신규 분양까지 자동 반영

      - name: 사이트 빌드 (빈 프로필·공유용)
        run: node build-site.mjs

      - name: 갱신된 index.json 커밋
        if: github.event_name != 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/index.json data/derived
          git diff --staged --quiet || git commit -m "chore: 상태/마감일 자동 갱신 [skip ci]"
          git push

      - name: 신규 공고 이슈 알림
        if: github.event_name != 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -f data/new-pending.json ] || exit 0
          n=$(node -e "process.stdout.write(String(require('./data/new-pending.json').length))")
          [ "$n" -gt 0 ] || exit 0
          open=$(gh issue list --state open --search "신규 공고 미추출 in:title" --json number --jq 'length')
          [ "$open" = "0" ] || { echo "이미 열린 알림 이슈 있음 — 생략"; exit 0; }
          body=$(node -e "const a=require('./data/new-pending.json');console.log(a.map(x=>'- '+x.type+' · '+x.title+' ('+(x.region||'')+')').join('\n'))")
          printf '%s\n\n로컬에서 `node process-all.mjs` 실행 → 요건추출·정규화 후 커밋하세요.' "$body" \
            | gh issue create --title "🆕 신규 공고 미추출 ${n}건" --body-file - || true

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
