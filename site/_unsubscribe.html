<!DOCTYPE html>
<!-- 알림 해지 페이지 템플릿. build-site.mjs가 /*__NOTIFY__*/null 을 Supabase 공개설정으로 치환해 site/unsubscribe.html 생성.
     서버 0 — 토큰(subscribers.id)으로 unsubscribe RPC 호출(SECURITY DEFINER, anon 실행권한만). -->
<html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>알림 해지 — 내 집 찾기</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#f5f6fa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#222;padding:20px}
  .card{background:#fff;border-radius:16px;padding:36px 32px;max-width:420px;width:100%;
    box-shadow:0 8px 30px rgba(16,24,40,.08);text-align:center}
  h1{font-size:20px;margin:0 0 14px}
  p{font-size:15px;line-height:1.6;margin:0;color:#444}
  a{color:#3b5bdb;text-decoration:none}
</style></head><body>
<div class="card">
  <h1>🔔 알림 해지</h1>
  <p id="msg">처리 중…</p>
</div>
<script>
const NOTIFY=/*__NOTIFY__*/null;
const msg=document.getElementById('msg');
const token=new URLSearchParams(location.search).get('t');
(async()=>{
  if(!NOTIFY||!NOTIFY.url){ msg.textContent='알림 기능이 설정되지 않았습니다.'; return; }
  if(!token){ msg.textContent='잘못된 해지 링크입니다.'; return; }
  try{
    const r=await fetch(NOTIFY.url+'/rest/v1/rpc/unsubscribe',{method:'POST',
      headers:{apikey:NOTIFY.anonKey,Authorization:'Bearer '+NOTIFY.anonKey,'Content-Type':'application/json'},
      body:JSON.stringify({p_token:token})});
    if(r.ok) msg.innerHTML='✅ 해지되었습니다.<br>더 이상 알림 메일을 보내지 않습니다.';
    else msg.textContent='해지 처리 중 오류가 발생했습니다 ('+r.status+'). 잠시 후 다시 시도해주세요.';
  }catch(e){ msg.textContent='네트워크 오류 — 잠시 후 다시 시도해주세요.'; }
})();
</script>
</body></html>
